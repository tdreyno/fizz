<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fizz Debugger</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --panel: #161b22;
        --panel-alt: #1f2630;
        --border: #273245;
        --text: #e6edf3;
        --muted: #8b9bb4;
        --accent: #7ee787;
        --accent-alt: #79c0ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top right,
            rgba(126, 231, 135, 0.12),
            transparent 32%
          ),
          radial-gradient(
            circle at bottom left,
            rgba(121, 192, 255, 0.14),
            transparent 28%
          ),
          var(--bg);
        color: var(--text);
        font:
          13px/1.45 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
      }

      #app {
        padding: 16px;
      }

      .status {
        margin-bottom: 16px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(22, 27, 34, 0.9);
      }

      .status strong {
        color: var(--accent);
      }

      .runtime-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      .runtime-tab {
        appearance: none;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(22, 27, 34, 0.85);
        color: var(--muted);
        cursor: pointer;
        font: inherit;
        padding: 8px 12px;
        transition:
          border-color 120ms ease,
          color 120ms ease,
          transform 120ms ease;
      }

      .runtime-tab:hover {
        border-color: rgba(121, 192, 255, 0.45);
        color: var(--text);
      }

      .runtime-tab-active {
        border-color: rgba(126, 231, 135, 0.55);
        color: var(--accent);
        transform: translateY(-1px);
      }

      .runtime-card {
        border: 1px solid var(--border);
        border-radius: 18px;
        background: linear-gradient(
          180deg,
          rgba(31, 38, 48, 0.95),
          rgba(22, 27, 34, 0.95)
        );
        overflow: hidden;
      }

      .runtime-card header {
        padding: 14px 16px 10px;
        border-bottom: 1px solid var(--border);
      }

      .runtime-card h2 {
        margin: 0;
        font-size: 14px;
      }

      .runtime-card p {
        margin: 4px 0 0;
        color: var(--muted);
      }

      .runtime-grid {
        display: grid;
        gap: 12px;
        padding: 16px;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }

      .panel-block {
        border: 1px solid rgba(139, 155, 180, 0.2);
        border-radius: 10px;
        background: rgba(13, 17, 23, 0.45);
        padding: 12px;
      }

      .panel-block h3 {
        margin: 0 0 8px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent-alt);
      }

      .empty {
        color: var(--muted);
      }

      /* Timeline Stack Styles */
      .timeline-block {
        grid-column: 1 / -1;
        display: flex;
        flex-direction: column;
        min-height: 200px;
        max-height: 500px;
      }

      .timeline-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(139, 155, 180, 0.18);
      }

      .timeline-filter-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .timeline-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        flex: 1;
      }

      .timeline-pending-count {
        border: 1px solid rgba(126, 231, 135, 0.28);
        border-radius: 999px;
        background: rgba(126, 231, 135, 0.12);
        color: var(--accent);
        font-size: 11px;
        line-height: 1;
        padding: 6px 10px;
        white-space: nowrap;
      }

      .timeline-window-info {
        border: 1px solid rgba(139, 155, 180, 0.28);
        border-radius: 999px;
        background: rgba(139, 155, 180, 0.12);
        color: var(--muted);
        font-size: 11px;
        line-height: 1;
        padding: 6px 10px;
        white-space: nowrap;
      }

      .timeline-filter-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        cursor: pointer;
        user-select: none;
      }

      .timeline-filter-item input[type="checkbox"] {
        cursor: pointer;
        accent-color: var(--accent);
      }

      .timeline-clear-btn {
        appearance: none;
        border: 1px solid rgba(139, 155, 180, 0.25);
        border-radius: 6px;
        background: rgba(13, 17, 23, 0.45);
        color: var(--muted);
        cursor: pointer;
        font: inherit;
        padding: 6px 12px;
        font-size: 12px;
        transition:
          border-color 120ms ease,
          color 120ms ease,
          background 120ms ease;
      }

      .timeline-pause-btn {
        appearance: none;
        border: 1px solid rgba(121, 192, 255, 0.25);
        border-radius: 6px;
        background: rgba(13, 17, 23, 0.45);
        color: var(--accent-alt);
        cursor: pointer;
        font: inherit;
        padding: 6px 12px;
        font-size: 12px;
        transition:
          border-color 120ms ease,
          color 120ms ease,
          background 120ms ease;
      }

      .timeline-pause-btn:hover {
        border-color: rgba(121, 192, 255, 0.5);
        color: var(--text);
        background: rgba(121, 192, 255, 0.08);
      }

      .timeline-pause-btn-active {
        border-color: rgba(126, 231, 135, 0.45);
        color: var(--accent);
        background: rgba(126, 231, 135, 0.08);
      }

      .timeline-clear-btn:hover {
        border-color: rgba(255, 108, 114, 0.45);
        color: #ffe5e7;
        background: #4f161c;
      }

      .timeline-stack {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
      }

      .timeline-stack::-webkit-scrollbar {
        width: 8px;
      }

      .timeline-stack::-webkit-scrollbar-track {
        background: transparent;
      }

      .timeline-stack::-webkit-scrollbar-thumb {
        background: rgba(126, 231, 135, 0.25);
        border-radius: 4px;
      }

      .timeline-stack::-webkit-scrollbar-thumb:hover {
        background: rgba(126, 231, 135, 0.45);
      }

      .timeline-entry {
        border-bottom: 1px solid rgba(139, 155, 180, 0.1);
        padding: 8px;
        transition: background 120ms ease;
      }

      .timeline-entry:hover {
        background: rgba(126, 231, 135, 0.05);
      }

      .timeline-entry-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        padding: 4px 0;
        user-select: none;
      }

      .timeline-entry-header::before {
        content: "▶";
        display: inline-block;
        margin-right: 8px;
        color: var(--accent-alt);
        font-size: 10px;
        transition: transform 120ms ease;
      }

      .timeline-entry-expanded .timeline-entry-header::before {
        transform: rotate(90deg);
      }

      .timeline-entry-type {
        font-weight: 600;
        color: var(--accent-alt);
        font-size: 12px;
      }

      .timeline-entry-subtitle {
        color: var(--muted);
        font-size: 11px;
        margin-left: 8px;
      }

      .timeline-entry-time {
        color: var(--muted);
        font-size: 11px;
        margin-left: auto;
        margin-right: 8px;
      }

      .timeline-entry-details {
        margin-top: 8px;
        padding: 8px 12px;
        background: rgba(13, 17, 23, 0.6);
        border-radius: 6px;
        border-left: 3px solid rgba(126, 231, 135, 0.35);
      }

      .data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
        border: 1px solid rgba(139, 155, 180, 0.2);
        border-radius: 8px;
        overflow: hidden;
      }

      .data-table th,
      .data-table td {
        padding: 6px 8px;
        border-bottom: 1px solid rgba(139, 155, 180, 0.12);
        text-align: left;
        vertical-align: top;
        word-break: break-word;
      }

      .data-table th {
        width: 42%;
        color: var(--accent-alt);
        font-weight: 600;
      }

      .data-table tr:last-child th,
      .data-table tr:last-child td {
        border-bottom: 0;
      }

      .diff-table thead th {
        width: auto;
        background: rgba(121, 192, 255, 0.08);
        color: var(--text);
      }

      .diff-table tbody th {
        width: 28%;
      }

      .timeline-entry-payload {
        margin: 0;
        font-size: 11px;
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--text);
      }

      .timeline-entry-empty-detail {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
      }

      .timeline-entry-update .timeline-entry-type {
        color: var(--accent);
      }

      .timeline-entry-update .timeline-entry-header::before {
        content: "◆";
        transform: none;
      }

      .timeline-entry-update .timeline-entry-details {
        border-left-color: rgba(126, 231, 135, 0.55);
      }

      .timeline-empty {
        color: var(--muted);
        font-size: 12px;
        margin: 20px 0;
        text-align: center;
      }

      .machine-graph-block {
        grid-column: 1 / -1;
      }

      .machine-graph-canvas {
        border: 1px solid rgba(139, 155, 180, 0.2);
        border-radius: 10px;
        background: radial-gradient(
          circle at top,
          rgba(121, 192, 255, 0.06),
          rgba(13, 17, 23, 0.4) 42%
        );
        max-height: 700px;
        overflow: auto;
        padding: 10px;
      }

      .machine-graph-canvas svg {
        display: block;
        min-width: 100%;
        width: 100%;
      }

      .machine-graph-empty {
        margin: 0;
        color: var(--muted);
      }

      .machine-graph-edge {
        fill: none;
        stroke: rgba(139, 155, 180, 0.5);
        stroke-width: 2;
        transition:
          stroke 70ms linear,
          stroke-width 70ms linear,
          filter 70ms linear;
      }

      .machine-graph-edge-special {
        stroke-dasharray: 7 5;
      }

      .machine-graph-edge-active {
        stroke: rgba(
          126,
          231,
          135,
          calc(0.2 + var(--machine-edge-pulse-strength, 0) * 0.8)
        );
        stroke-width: calc(2 + var(--machine-edge-pulse-strength, 0) * 1.6);
        filter: drop-shadow(
          0 0 calc(2px + var(--machine-edge-pulse-strength, 0) * 9px)
            rgba(126, 231, 135, 0.65)
        );
      }

      .machine-graph-arrow {
        fill: rgba(139, 155, 180, 0.75);
      }

      .machine-graph-edge-label {
        fill: rgba(191, 208, 230, 0.92);
        font-size: 10px;
        dominant-baseline: middle;
        text-anchor: middle;
      }

      .machine-graph-edge-label-bg {
        fill: rgba(8, 16, 28, 0.88);
        stroke: rgba(139, 155, 180, 0.45);
        stroke-width: 1;
        transition:
          fill 70ms linear,
          stroke 70ms linear;
      }

      .machine-graph-edge-label-active {
        fill: #c8ffe1;
        font-weight: 700;
      }

      .machine-graph-node-shape {
        fill: rgba(13, 17, 23, 0.8);
        stroke: rgba(121, 192, 255, 0.35);
        stroke-width: 1.4;
      }

      .machine-graph-node-label {
        fill: var(--text);
        font-size: 11px;
        font-weight: 700;
        text-anchor: middle;
      }

      .machine-graph-node-caption {
        fill: var(--muted);
        font-size: 9px;
        letter-spacing: 0.08em;
        text-anchor: middle;
        text-transform: uppercase;
      }

      .machine-graph-node-active .machine-graph-node-shape {
        fill: rgba(126, 231, 135, 0.14);
        stroke: rgba(126, 231, 135, 0.95);
      }

      .machine-graph-node-entry .machine-graph-node-shape {
        stroke: rgba(121, 192, 255, 0.82);
      }

      .machine-graph-node-special .machine-graph-node-shape {
        fill: rgba(251, 191, 36, 0.12);
        stroke: rgba(251, 191, 36, 0.85);
      }

      .machine-graph-node-nested-parent .machine-graph-node-shape {
        fill: rgba(125, 211, 252, 0.1);
      }

      .machine-graph-node-nested-state .machine-graph-node-shape {
        fill: rgba(74, 222, 128, 0.12);
      }

      .machine-graph-legend {
        margin: 8px 2px 0;
        color: var(--muted);
        font-size: 11px;
      }

      .machine-graph-internal {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .machine-graph-internal-chip {
        border: 1px solid rgba(139, 155, 180, 0.28);
        border-radius: 999px;
        color: var(--text);
        font-size: 10px;
        letter-spacing: 0.04em;
        opacity: 0.65;
        padding: 4px 9px;
        text-transform: uppercase;
        transition:
          opacity 120ms ease,
          transform 120ms ease,
          box-shadow 120ms ease;
      }

      .machine-graph-internal-chip-active {
        animation: machine-graph-internal-chip-pulse 420ms ease-out 1;
        opacity: 1;
        transform: translateY(-1px);
      }

      .machine-graph-internal-chip-async {
        background: rgba(121, 192, 255, 0.14);
        border-color: rgba(121, 192, 255, 0.45);
      }

      .machine-graph-internal-chip-timer {
        background: rgba(244, 198, 79, 0.14);
        border-color: rgba(244, 198, 79, 0.45);
      }

      .machine-graph-internal-chip-interval {
        background: rgba(255, 149, 128, 0.14);
        border-color: rgba(255, 149, 128, 0.45);
      }

      .machine-graph-internal-chip-frame {
        background: rgba(139, 155, 180, 0.14);
        border-color: rgba(139, 155, 180, 0.45);
      }

      .machine-graph-internal-chip-command {
        background: rgba(126, 231, 135, 0.14);
        border-color: rgba(126, 231, 135, 0.45);
      }

      @keyframes machine-graph-internal-chip-pulse {
        0% {
          box-shadow: 0 0 0 rgba(126, 231, 135, 0);
          transform: translateY(0);
        }

        45% {
          box-shadow: 0 0 12px rgba(126, 231, 135, 0.45);
          transform: translateY(-2px);
        }

        100% {
          box-shadow: 0 0 0 rgba(126, 231, 135, 0);
          transform: translateY(-1px);
        }
      }

      @media (max-width: 900px) {
        .machine-graph-canvas {
          max-height: 520px;
        }

        .timeline-controls {
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./panel.js"></script>
  </body>
</html>
