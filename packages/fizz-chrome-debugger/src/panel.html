<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fizz Debugger</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --panel: #161b22;
        --panel-alt: #1f2630;
        --border: #273245;
        --text: #e6edf3;
        --muted: #8b9bb4;
        --accent: #7ee787;
        --accent-alt: #79c0ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top right,
            rgba(126, 231, 135, 0.12),
            transparent 32%
          ),
          radial-gradient(
            circle at bottom left,
            rgba(121, 192, 255, 0.14),
            transparent 28%
          ),
          var(--bg);
        color: var(--text);
        font:
          13px/1.45 ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
      }

      #app {
        padding: 16px;
      }

      .status {
        margin-bottom: 16px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(22, 27, 34, 0.9);
      }

      .status strong {
        color: var(--accent);
      }

      .runtime-list {
        display: grid;
        gap: 14px;
      }

      .runtime-card {
        border: 1px solid var(--border);
        border-radius: 18px;
        background: linear-gradient(
          180deg,
          rgba(31, 38, 48, 0.95),
          rgba(22, 27, 34, 0.95)
        );
        overflow: hidden;
      }

      .runtime-card header {
        padding: 14px 16px 10px;
        border-bottom: 1px solid var(--border);
      }

      .runtime-card h2 {
        margin: 0;
        font-size: 14px;
      }

      .runtime-card p {
        margin: 4px 0 0;
        color: var(--muted);
      }

      .runtime-grid {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      .panel-block {
        border: 1px solid rgba(139, 155, 180, 0.18);
        border-radius: 14px;
        background: rgba(13, 17, 23, 0.45);
        padding: 12px;
      }

      .panel-block h3 {
        margin: 0 0 8px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent-alt);
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--text);
      }

      ul {
        margin: 0;
        padding-left: 18px;
      }

      li + li {
        margin-top: 6px;
      }

      .empty {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./panel.js"></script>
  </body>
</html>
